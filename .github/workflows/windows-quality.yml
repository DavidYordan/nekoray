name: Windows quality gates

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-and-go:
    name: Repository and Go checks
    runs-on: windows-2022
    timeout-minutes: 45

    steps:
      - name: Check out pinned sources
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.7"
          cache: true
          cache-dependency-path: |
            go/grpc_server/go.sum
            go/cmd/nekobox_core/go.sum

      - name: Verify repository hygiene
        shell: pwsh
        run: ./tools/verify_repository_hygiene.ps1

      - name: Prepare pinned RouteFluent core sources
        shell: pwsh
        run: |
          python ./third_party/routefluent-sing-box/build_routefluent_sing_box.py `
            --goos windows `
            --goarch amd64 `
            --tags "with_clash_api with_gvisor with_quic with_wireguard with_utls" `
            --output "$env:RUNNER_TEMP/sing-box.exe" `
            --manifest "$env:RUNNER_TEMP/routefluent-sing-box.json"

      - name: Test gRPC helper module
        shell: pwsh
        working-directory: go/grpc_server
        run: go test ./...

      - name: Test core module
        shell: pwsh
        working-directory: go/cmd/nekobox_core
        run: go test ./...

      - name: Test OpenWrt verifier safety contract
        shell: pwsh
        run: python ./test/test_verify_mixed_openwrt.py -v

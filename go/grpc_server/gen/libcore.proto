syntax = "proto3";

package libcore;
option go_package = "grpc_server/gen";

service LibcoreService {
  rpc Exit(EmptyReq) returns (LifecycleStateResp) {}
  rpc Update(UpdateReq) returns (UpdateResp) {}
  //
  rpc Start(LoadConfigReq) returns (ErrorResp) {}
  rpc Stop(EmptyReq) returns (ErrorResp) {}
  rpc GetDaemonInfo(EmptyReq) returns (DaemonInfoResp) {}
  rpc ReconcileLifecycle(LifecycleReconcileReq) returns (LifecycleStateResp) {}
  rpc Test(TestReq) returns (TestResp) {}
  rpc QueryStats(QueryStatsReq) returns (QueryStatsResp) {}
  rpc ListConnections(EmptyReq) returns (ListConnectionsResp) {}
}

message EmptyReq {}

message EmptyResp {}

message ErrorResp {
  string error = 1;
}

message LoadConfigReq {
  string core_config = 1;
  bool enable_nekoray_connections = 2;
  repeated string stats_outbounds = 3;
}

message DaemonInfoResp {
  string daemon_instance_id = 1;
  uint32 lifecycle_protocol_version = 2;
}

enum LifecyclePhase {
  LIFECYCLE_PHASE_UNSPECIFIED = 0;
  LIFECYCLE_PHASE_STOPPED = 1;
  LIFECYCLE_PHASE_STARTING = 2;
  LIFECYCLE_PHASE_ACTIVE = 3;
  LIFECYCLE_PHASE_STOPPING = 4;
  LIFECYCLE_PHASE_BLOCKED = 5;
  LIFECYCLE_PHASE_EXITING = 6;
}

enum LifecycleCommandKind {
  LIFECYCLE_COMMAND_UNSPECIFIED = 0;
  LIFECYCLE_COMMAND_START = 1;
  LIFECYCLE_COMMAND_STOP = 2;
  LIFECYCLE_COMMAND_EXIT = 3;
}

enum LifecycleCommandOutcome {
  LIFECYCLE_OUTCOME_UNSPECIFIED = 0;
  LIFECYCLE_OUTCOME_SUCCEEDED = 1;
  LIFECYCLE_OUTCOME_FAILED_CLEAN = 2;
  LIFECYCLE_OUTCOME_REJECTED_CLEAN = 3;
  LIFECYCLE_OUTCOME_BLOCKED = 4;
  LIFECYCLE_OUTCOME_FENCED_NOT_ADMITTED = 5;
  LIFECYCLE_OUTCOME_SUPERSEDED_UNKNOWN = 6;
}

message LifecycleReconcileReq {
  uint64 target_command_sequence = 1;
  LifecycleCommandKind target_command_kind = 2;
  string target_config_sha256 = 3;
}

message LifecycleCommandRecord {
  uint64 sequence = 1;
  LifecycleCommandKind kind = 2;
  LifecycleCommandOutcome outcome = 3;
  string config_sha256 = 4;
  bool requested_config_matches = 5;
}

message LifecycleStateResp {
  string daemon_instance_id = 1;
  uint64 ordering_watermark = 2;
  LifecyclePhase phase = 3;
  uint64 runtime_generation = 4;
  bool has_current = 5;
  uint64 active_start_command_sequence = 6;
  string current_config_sha256 = 7;
  LifecycleCommandRecord target_command = 8;
}

enum TestMode {
  TcpPing = 0;
  UrlTest = 1;
  FullTest = 2;
}

message TestReq {
  TestMode mode = 1;
  int32 timeout = 6;
  // TcpPing
  string address = 2;
  // UrlTest
  LoadConfigReq config = 3;
  string inbound = 4;
  string url = 5;
  // FullTest
  string in_address = 7;
  bool full_latency = 8;
  bool full_speed = 9;
  string full_speed_url = 13;
  int32 full_speed_timeout = 14;
  bool full_in_out = 10;
  bool full_udp_latency = 12;
  //
  bool full_nat = 11 [deprecated = true];
}

message TestResp {
  string error = 1;
  int32 ms = 2;
  string full_report = 3;
}

message QueryStatsReq{
  string tag = 1;
  string direct = 2;
}

message QueryStatsResp{
  int64 traffic = 1;
}

enum UpdateAction {
  Check = 0;
  Download = 1;
}

message UpdateReq {
  UpdateAction action = 1;
  bool check_pre_release = 2;
}

message UpdateResp {
  string error = 1;
  string assets_name = 2;
  string download_url = 3;
  string release_url = 4;
  string release_note = 5;
  bool is_pre_release = 6;
}

message ListConnectionsResp {
  string nekoray_connections_json = 1;
}
